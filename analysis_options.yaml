include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # The pure-Dart rule engine in lib/core/ must never import Flutter.
    # (Enforced by review + this being a hard architectural rule in CLAUDE.md.)
    todo: ignore

linter:
  rules:
    - prefer_const_constructors
    - prefer_final_locals
    - avoid_print
    - always_declare_return_types
    - unawaited_futures
